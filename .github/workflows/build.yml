name: Build LocalAI APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # allows manual trigger from the GitHub Actions tab

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-22.04

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. JDK 17 ─────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Android SDK ────────────────────────────────────────────────────
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      # ── 4. NDK + CMake ────────────────────────────────────────────────────
      - name: Install NDK and CMake
        run: |
          sdkmanager --install "ndk;25.2.9519653" "cmake;3.22.1"
          echo "ANDROID_NDK_HOME=$ANDROID_SDK_ROOT/ndk/25.2.9519653" >> $GITHUB_ENV

      # ── 5. Clone llama.cpp (pinned stable tag) ────────────────────────────
      - name: Clone llama.cpp
        run: |
          git clone --depth=1 --branch b3447 \
            https://github.com/ggerganov/llama.cpp \
            app/src/main/cpp/llama.cpp
          echo "Cloned: $(git -C app/src/main/cpp/llama.cpp log --oneline -1)"

      # ── 6. Cache Gradle ───────────────────────────────────────────────────
      - name: Cache Gradle dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 7. Cache NDK .cxx build (saves ~10 min on repeat builds) ─────────
      - name: Cache NDK build
        uses: actions/cache@v4
        with:
          path: app/.cxx
          key: ndk-${{ hashFiles('app/src/main/cpp/**') }}
          restore-keys: ndk-

      # ── 8. Download Gradle wrapper jar ────────────────────────────────────
      - name: Setup Gradle wrapper
        run: |
          mkdir -p gradle/wrapper
          curl -sL \
            "https://services.gradle.org/distributions/gradle-8.3-bin.zip" \
            -o /tmp/gradle.zip
          unzip -j /tmp/gradle.zip \
            "gradle-8.3/lib/plugins/gradle-wrapper-*.jar" \
            -d gradle/wrapper/ 2>/dev/null || true
          # Fallback: download wrapper jar directly
          if [ ! -f gradle/wrapper/gradle-wrapper.jar ]; then
            curl -sL \
              "https://raw.githubusercontent.com/gradle/gradle/v8.3.0/gradle/wrapper/gradle-wrapper.jar" \
              -o gradle/wrapper/gradle-wrapper.jar
          fi
          chmod +x gradlew

      # ── 9. Build DEBUG APK ────────────────────────────────────────────────
      - name: Build debug APK
        run: |
          ./gradlew assembleDebug \
            --no-daemon \
            --stacktrace \
            -Pandroid.ndkVersion=25.2.9519653 \
            -Pandroid.ndkPath=${{ env.ANDROID_NDK_HOME }}
        env:
          ANDROID_SDK_ROOT: ${{ env.ANDROID_SDK_ROOT }}

      # ── 10. Rename APK ────────────────────────────────────────────────────
      - name: Rename APK
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          DATE=$(date +'%Y%m%d')
          APK_OUT="LocalAI-debug-${DATE}-${SHORT_SHA}.apk"
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/${APK_OUT}
          echo "APK_NAME=${APK_OUT}" >> $GITHUB_ENV

      # ── 11. Upload APK artifact ───────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: LocalAI-APK-${{ github.sha }}
          path: app/build/outputs/apk/debug/${{ env.APK_NAME }}
          retention-days: 30

      # ── 12. Job summary ───────────────────────────────────────────────────
      - name: Build summary
        run: |
          SIZE=$(du -sh "app/build/outputs/apk/debug/${{ env.APK_NAME }}" | cut -f1)
          echo "## ✅ Build Successful" >> $GITHUB_STEP_SUMMARY
          echo "| | |" >> $GITHUB_STEP_SUMMARY
          echo "|---|---|" >> $GITHUB_STEP_SUMMARY
          echo "| **APK** | \`${{ env.APK_NAME }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "| **Size** | ${SIZE} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Commit** | \`${{ github.sha }}\` |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 **Download from the Artifacts section above ↑**" >> $GITHUB_STEP_SUMMARY
